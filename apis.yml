aid: songtrust
name: Songtrust
description: >-
  Songtrust is a New York City-based music publishing administration platform
  and a Downtown Music company. The service helps songwriters, producers,
  composers, and independent publishers register their compositions and collect
  global publishing royalties — including performance, mechanical, digital,
  micro-sync, and neighboring rights — through a network of 65+ collection
  societies and pay sources across 240 countries and territories. Songtrust's
  web-based dashboard provides song registration, catalog management, writer
  and publisher splits, royalty statement matching, metadata enrichment, weekly
  song monitoring, and quarterly payouts, while letting clients retain 100%
  ownership of their copyrights. The commercial model is a one-time $100 sign-up
  fee per songwriter plus 15% of collected performance royalties and 20% of
  non-performance royalties — positioned as a transparent flat-rate alternative
  to traditional publisher deals. As of this profile, Songtrust does not
  expose a public developer API, OpenAPI specification, SDK, or partner
  integration portal; the platform is consumed exclusively through the
  Songtrust client dashboard at app.songtrust.com. Integrations and data
  exchange with PROs, mechanical rights societies, DSPs, and Downtown sister
  companies are operated internally rather than through a documented public
  surface.
